name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint
        run: |
          ruff check image_morpher.py resize.py imagemorphing tests

      - name: Format check
        run: |
          ruff format --check image_morpher.py resize.py imagemorphing tests

      - name: Compile Python sources
        run: |
          python -m compileall image_morpher.py resize.py imagemorphing tests

      - name: Run tests
        run: |
          pytest -q
